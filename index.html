<!DOCTYPE html>
<html>
<head>
  <title>Game Lompat Halangan</title>
  <style>
    body {
      margin: 0;
      overflow: hidden;
      background: skyblue;
    }

    #player {
      width: 50px;
      height: 50px;
      background: red;
      position: absolute;
      bottom: 50px;
      left: 50px;
    }

    #ground {
      position: absolute;
      bottom: 0;
      width: 100%;
      height: 50px;
      background: green;
    }

    #obstacle {
      width: 40px;
      height: 60px;
      background: black;
      position: absolute;
      bottom: 50px;
      right: -50px;
    }

    #score {
      position: absolute;
      top: 20px;
      left: 20px;
      font-size: 20px;
      font-family: Arial;
    }
  </style>
</head>

<body>

<div id="player"></div>
<div id="ground"></div>
<div id="obstacle"></div>
<div id="score">Score: 0</div>

<script>
let player = document.getElementById("player");
let obstacle = document.getElementById("obstacle");
let scoreText = document.getElementById("score");

let jumping = false;
let position = 50;
let obstacleX = window.innerWidth;
let score = 0;
let gameOver = false;

// LOMPAT
document.addEventListener("keydown", function(e) {
  if (e.code === "Space" && !jumping && !gameOver) {
    jumping = true;
    jump();
  }
});

function jump() {
  let up = setInterval(() => {
    if (position >= 200) {
      clearInterval(up);
      fall();
    } else {
      position += 10;
      player.style.bottom = position + "px";
    }
  }, 20);
}

function fall() {
  let down = setInterval(() => {
    if (position <= 50) {
      position = 50;
      player.style.bottom = position + "px";
      jumping = false;
      clearInterval(down);
    } else {
      position -= 10;
      player.style.bottom = position + "px";
    }
  }, 20);
}

// HALANGAN GERAK
function moveObstacle() {
  let move = setInterval(() => {
    if (gameOver) return clearInterval(move);

    obstacleX -= 8;
    obstacle.style.left = obstacleX + "px";

    // reset obstacle bila lepas kiri
    if (obstacleX < -50) {
      obstacleX = window.innerWidth;
      score++;
      scoreText.innerHTML = "Score: " + score;
    }

    // COLLISION
    if (
      obstacleX < 100 &&
      obstacleX > 30 &&
      position < 110
    ) {
      gameOver = true;
      alert("💀 Game Over! Score: " + score);
      location.reload();
    }

  }, 20);
}

moveObstacle();
</script>

</body>
</html>
