<!DOCTYPE html>
<html>
<head>
  <title>Game Lompat</title>
  <style>
    body {
      margin: 0;
      overflow: hidden;
      background: #87CEEB;
    }

    #player {
      width: 40px;
      height: 40px;
      background: red;
      position: absolute;
      bottom: 50px;
      left: 50px;
    }

    #ground {
      position: absolute;
      bottom: 0;
      width: 100%;
      height: 50px;
      background: green;
    }
  </style>
</head>

<body>

<div id="player"></div>
<div id="ground"></div>

<script>
let player = document.getElementById("player");
let isJumping = false;
let gravity = 0;

document.addEventListener("keydown", function(e) {
  if (e.code === "Space" && !isJumping) {
    jump();
  }
});

function jump() {
  isJumping = true;
  gravity = 15;

  let up = setInterval(() => {
    gravity -= 1;
    player.style.bottom = (parseInt(player.style.bottom || 50) + gravity) + "px";

    if (gravity <= 0) {
      clearInterval(up);
      fall();
    }
  }, 20);
}

function fall() {
  let down = setInterval(() => {
    let pos = parseInt(player.style.bottom || 50);
    if (pos > 50) {
      player.style.bottom = (pos - 5) + "px";
    } else {
      player.style.bottom = "50px";
      isJumping = false;
      clearInterval(down);
    }
  }, 20);
}
</script>

</body>
</html>
