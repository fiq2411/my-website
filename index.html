<!DOCTYPE html>
<html>
<head>
  <title>Game dengan Sound</title>

  <style>
    body {
      margin: 0;
      font-family: Arial;
      background: skyblue;
      text-align: center;
    }

    #player {
      width: 50px;
      height: 50px;
      background: red;
      position: absolute;
      bottom: 50px;
      left: 50px;
    }

    #obstacle {
      width: 40px;
      height: 60px;
      background: black;
      position: absolute;
      bottom: 50px;
      right: -60px;
    }

    #score {
      position: absolute;
      top: 20px;
      left: 20px;
      font-size: 20px;
    }

    #startBtn {
      margin-top: 200px;
      padding: 15px 25px;
      font-size: 18px;
    }
  </style>
</head>

<body>

<h1>🎮 Game Sound Edition</h1>
<button id="startBtn" onclick="startGame()">START GAME</button>

<div id="player"></div>
<div id="obstacle"></div>
<div id="score">Score: 0</div>

<!-- 🔊 SOUND -->
<audio id="bgm" loop>
  <source src="https://www.soundjay.com/misc/sounds/bell-ringing-05.mp3" type="audio/mp3">
</audio>

<audio id="jumpSound">
  <source src="https://www.soundjay.com/button/sounds/button-16.mp3" type="audio/mp3">
</audio>

<audio id="gameOverSound">
  <source src="https://www.soundjay.com/button/sounds/button-10.mp3" type="audio/mp3">
</audio>

<script>
let player = document.getElementById("player");
let obstacle = document.getElementById("obstacle");
let scoreText = document.getElementById("score");

let bgm = document.getElementById("bgm");
let jumpSound = document.getElementById("jumpSound");
let gameOverSound = document.getElementById("gameOverSound");

let jumping = false;
let position = 50;
let obstacleX = window.innerWidth;
let score = 0;
let gameRunning = false;

function startGame() {
  document.getElementById("startBtn").style.display = "none";
  bgm.play(); // 🎶 start music
  gameRunning = true;
  gameLoop();
}

// JUMP
document.addEventListener("keydown", function(e) {
  if (e.code === "Space" && !jumping && gameRunning) {
    jumping = true;
    jumpSound.play(); // 💥 sound lompat
    jump();
  }
});

function jump() {
  let up = setInterval(() => {
    if (position >= 200) {
      clearInterval(up);
      fall();
    } else {
      position += 10;
      player.style.bottom = position + "px";
    }
  }, 20);
}

function fall() {
  let down = setInterval(() => {
    if (position <= 50) {
      position = 50;
      player.style.bottom = position + "px";
      jumping = false;
      clearInterval(down);
    } else {
      position -= 10;
      player.style.bottom = position + "px";
    }
  }, 20);
}

// GAME LOOP
function gameLoop() {
  if (!gameRunning) return;

  obstacleX -= 8;
  obstacle.style.left = obstacleX + "px";

  if (obstacleX < -60) {
    obstacleX = window.innerWidth;
    score++;
    scoreText.innerHTML = "Score: " + score;
  }

  // collision
  if (obstacleX < 100 && obstacleX > 40 && position < 110) {
    gameRunning = false;
    bgm.pause();
    gameOverSound.play();
    alert("💀 Game Over! Score: " + score);
    location.reload();
  }

  requestAnimationFrame(gameLoop);
}
</script>

</body>
</html>
