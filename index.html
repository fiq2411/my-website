<!DOCTYPE html>
<html>
<head>
  <title>Runner Game</title>

  <style>
    body {
      margin: 0;
      overflow: hidden;
      background: skyblue;
      font-family: Arial;
    }

    /* BACKGROUND TEXT (nama bergerak) */
    .bg-text {
      position: absolute;
      white-space: nowrap;
      font-size: 60px;
      color: rgba(255,255,255,0.3);
      top: 40%;
      animation: moveText 8s linear infinite;
    }

    @keyframes moveText {
      from { left: 100%; }
      to { left: -100%; }
    }

    /* PLAYER */
    #player {
      width: 50px;
      height: 50px;
      background: red;
      position: absolute;
      bottom: 50px;
      left: 50px;
    }

    /* GROUND */
    #ground {
      position: absolute;
      bottom: 0;
      width: 100%;
      height: 50px;
      background: green;
    }

    /* OBSTACLE */
    #obstacle {
      width: 40px;
      height: 60px;
      background: black;
      position: absolute;
      bottom: 50px;
      right: -60px;
    }

    /* SCORE */
    #score {
      position: absolute;
      top: 20px;
      left: 20px;
      font-size: 20px;
    }
  </style>
</head>

<body>

<!-- BACKGROUND NAME -->
<div class="bg-text">🔥 GAME BY AWAK 🔥</div>

<div id="player"></div>
<div id="ground"></div>
<div id="obstacle"></div>
<div id="score">Score: 0</div>

<script>
let player = document.getElementById("player");
let obstacle = document.getElementById("obstacle");
let scoreText = document.getElementById("score");

let jumping = false;
let position = 50;
let obstacleX = window.innerWidth;
let score = 0;
let speed = 8;

// JUMP
document.addEventListener("keydown", function(e) {
  if (e.code === "Space" && !jumping) {
    jumping = true;
    jump();
  }
});

function jump() {
  let up = setInterval(() => {
    if (position >= 200) {
      clearInterval(up);
      fall();
    } else {
      position += 10;
      player.style.bottom = position + "px";
    }
  }, 20);
}

function fall() {
  let down = setInterval(() => {
    if (position <= 50) {
      position = 50;
      player.style.bottom = position + "px";
      jumping = false;
      clearInterval(down);
    } else {
      position -= 10;
      player.style.bottom = position + "px";
    }
  }, 20);
}

// OBSTACLE LOOP (PENTING FIX)
function gameLoop() {
  obstacleX -= speed;
  obstacle.style.left = obstacleX + "px";

  // reset obstacle
  if (obstacleX < -60) {
    obstacleX = window.innerWidth + 100;
    score++;
    scoreText.innerHTML = "Score: " + score;
  }

  // collision
  if (
    obstacleX < 100 &&
    obstacleX > 40 &&
    position < 110
  ) {
    alert("💀 Game Over! Score: " + score);
    location.reload();
  }

  requestAnimationFrame(gameLoop);
}

gameLoop();
</script>

</body>
</html>
